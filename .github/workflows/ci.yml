name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        # PYTHONPATH=корень репо + `python -m pytest` (добавляет cwd) гарантируют импорт
        # top-level модулей (storage/registry/pipeline) независимо от editable-установки.
        # tesseract в CI не ставим — OCR-тест корректно скипается (см. tests/test_cv_import.py).
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest -q
