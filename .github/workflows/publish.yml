name: Publish to npm

# Публикует пакет в npm registry при пуше тега vX.Y.Z, либо вручную (workflow_dispatch).
# Требуется секрет репозитория NPM_TOKEN (npm → Access Tokens → Automation/Granular).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    # Секрет NPM_TOKEN хранится в Environment "release" (репо → Settings → Environments).
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Sanity check CLI
        run: node --check bin/jobber.js

      - name: Publish (public scoped)
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
