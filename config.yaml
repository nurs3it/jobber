# ============================================================
# Jobber — единый источник правды конфигурации.
# Секреты сюда НЕ кладём — они в .env. Здесь только настройки поведения.
# Многое из секции `filters` заполняется автоматически на /onboard из резюме.
# ============================================================

# --- Источники вакансий ---
# Provider-agnostic: ядро не знает о Telegram. Включай/выключай источники тут.
sources:
  telegram:
    enabled: true
    # Архив Telegram = folder_id 1. Сканируем его тоже.
    include_archived: true
    # Диалоги, которые никогда не сканируем (по @username, id или названию).
    exclude_dialogs: []
    # Мягкие задержки между запросами к Telegram (анти-flood), секунды.
    delay_between_requests: 0.5
  linkedin:
    enabled: false          # заглушка (Фаза 7)
  webboards:
    enabled: false          # заглушка (Фаза 7)

# --- Глубина первого прохода ---
# Сколько дней истории просканировать при самом первом запуске (архив + все диалоги).
# Пользователь выбирает на /onboard; здесь — дефолт. Дальше работает per-dialog курсор.
first_pass:
  depth_days: 14            # варианты по вкусу: 7 / 14 / 30
  ask_on_onboard: true      # спросить глубину во время онбординга
  # Защитный кап на первый (без курсора) проход: не тянуть всю историю диалога целиком.
  max_messages_per_dialog: 300

# --- Предфильтр (эвристика до LLM, экономит токены) ---
# Сообщение проходит дальше к LLM, если содержит любое из ключевых слов (регистр игнорируется).
# Расширяемо. RU + EN.
prefilter:
  enabled: true
  keywords_ru:
    - вакансия
    - вакансии
    - ищем
    - требуется
    - в команду
    - нужен
    - нужна
    - ищу разработчика
    - открыта позиция
    - зп
    - зарплата
    - оклад
    - удалённо
    - удаленно
    - удаленка
    - релокация
    - офер
    - оффер
    - резюме
  keywords_en:
    - vacancy
    - hiring
    - "we're hiring"
    - we are hiring
    - job opening
    - open position
    - looking for
    - join our team
    - salary
    - remote
    - relocation
    - apply
  # Хэштеги-маркеры (без #, сравниваем как подстроки).
  hashtags:
    - вакансия
    - hiring
    - job
    - jobs
    - вакансии

# --- Скоринг релевантности (LLM сопоставляет вакансию с profile/cv.md) ---
scoring:
  # Минимальный скор 0–100, чтобы вакансия попала в дайджест.
  min_score: 55
  # Скор, ниже которого даже не генерируем сопроводительное (экономия).
  cover_letter_threshold: 60

# --- Фильтры соискателя ---
# Заполняются автоматически на /onboard из резюме; можно править вручную или через /profile-edit.
filters:
  roles: []                 # напр.: ["Frontend", "React", "TypeScript"]
  location: null            # напр.: "Алматы" или null
  remote_only: false        # только удалёнка?
  relocation_ok: false      # рассматриваем релокацию?
  salary_min: null          # минимум в валюте резюме или null = не фильтровать
  salary_currency: null     # напр.: "KZT", "USD"
  stop_factors: []          # стоп-факторы: ["стажировка", "1С", "продажи"]

# --- Сопроводительные письма ---
cover_letter:
  tone: friendly            # friendly | formal | youthful
  youthful: true            # молодёжный, человечный тон
  max_sentences: 6          # короткое письмо
  language: ru              # ru | en | auto (auto = язык вакансии)
  # Письмо — всегда ТОЛЬКО черновик под ревью. Ничего не отправляется автоматически.

# --- Дайджест ---
digest:
  # Путь к Obsidian vault. По умолчанию — папка vault/ в корне проекта.
  vault_path: ./vault
  # Подпапка внутри vault для файлов дайджеста.
  subfolder: Jobber
  # Имя файла дайджеста (strftime). Датированный.
  filename_format: "%Y-%m-%d-jobber.md"
  # Время ежедневного дайджеста (для расписания launchd/cron), локальное.
  schedule_time: "09:00"
  # Fuzzy-порог схлопывания дубликатов вакансий (0..1, выше = строже совпадение).
  dedup_similarity: 0.85

# --- LLM (для автономного программного пути классификации/писем по расписанию) ---
# В интерактивном сценарии LLM-шаги делает сам Claude Code и эти настройки не нужны.
llm:
  model: claude-sonnet-4-6   # быстрый и точный для классификации; можно claude-haiku-4-5 для экономии
  max_tokens: 1024

# --- Логирование ---
logging:
  level: INFO               # DEBUG | INFO | WARNING | ERROR
  dir: ./logs
  rotate_max_bytes: 1048576 # 1 МБ
  rotate_backups: 5
  # ВАЖНО: никогда не логировать содержимое .env, сессию или CV.
